body:
  text: 光祿大夫大司徒三藏法師沙囉巴奉詔譯如是我聞一時婆伽梵在三十三天善法堂中與諸比丘諸大菩薩天主帝釋無量眾俱爾時婆伽梵敷座而坐即入普觀烏瑟尾沙三昧時婆伽梵忽從肉髻演出祕密微妙法行南謨一切諸佛諸大菩薩眾南謨佛陀耶南謨達摩耶南謨僧伽耶南謨七俱胝佛諸大聲聞眾南謨世間所有阿羅漢眾南謨一切預流眾南謨一切一來眾南無一切不還眾南謨世間諸正行眾南謨諸向正行眾南謨以呪詛厭禱亦能饒益諸大天仙眾南謨成就持明眾南謨大梵天王眾南謨天主帝釋眾南謨嚧陀囉二合耶烏摩般帝娑醯夜耶眾南謨無愛子五大手印而敬禮眾南謨摧三界城樂處寒林母鬼恭敬摩訶迦辣眾南謨婆伽梵如來俱囉耶南謨蓮華俱囉耶南謨金剛俱囉耶南謨寶珠俱囉耶南謨大象俱囉耶南謨孺童俱囉耶南謨龍種俱囉耶南謨婆伽梵如來應正等覽勇堅部器械王佛南謨婆伽梵如來應正等覺無量光佛南謨婆伽梵如來應正等覺不動尊佛南謨婆伽梵如來應正等覺藥師瑠璃光王佛南謨婆伽梵如來應正等覺娑羅樹華普遍開敷王佛南謨婆伽梵如來應正等覺釋迦牟尼佛南謨婆伽梵如來應正等覺寶幢王佛南謨婆伽梵如來應正等覺普賢王佛南謨婆伽梵如來應正等覺毘盧遮那佛南謨婆伽梵如來應正等覺廣目優鉢羅華香幢王佛如是敬禮諸佛等已婆伽婆帝佛頂大白傘蓋無有能敵般囉二合當雞囉母能滅一切部多鬼魅斷諸明呪解脫繫縛遠離夭橫憂惱惡夢摧壞八萬四千妖魔及八執曜復能使令二十八宿生大歡喜亦能移迴一切冤害所有一切起毒害者并諸惡夢皆使殄滅又能救除毒藥器械水火等難無敵大勢力暴惡大力母熾盛威光母白蓋大力母焰鬘白衣母多羅𮜫蹙相稱鬘勝金剛蓮相金剛相具鬘無能敵金剛牆摧母諸善天恭敬善相大威光救度大力母金剛鋜諸等金剛童持種持杵種金鬘赭色寶珠母光明金剛鬘窈窕母持杵眼如金光母金剛炬白母蓮華日月光諸手印眾願擁護我願擁護我唵唎瑟羯拏般囉二合舍悉多二合耶一薩唎嚩二合怛他伽跢二烏瑟尼沙悉怛引怛鉢帝唎二合吽覩嚧雍二合三暫鉢拏迦唎吽覩嚧雍二合四悉耽二合嚩拏迦唎吽覩嚧雍二合五摩喝拏伽唎吽覩嚧雍二合六摩訶逼姪耶二合三囉佉拏迦唎吽覩嚧雍二合七鉢囉逼姪耶二合三嚩佉拏迦唎吽覩嚧雍二合八薩唎嚩二合覩瑟怛二合喃九悉耽二合鉢拏迦唎吽覩嚧雍二合十薩唎嚩二合藥叉囉剎薩吃囉二合訶喃毘耽薩拏迦唎吽覩嚧雍二合十拶覩囉尸底喃十吃囉二合訶薩訶悉囉二合喃十毘耽薩拏迦唎吽覩嚧雍二合十阿室恒二合頻舍帝喃拏叉怛囉二合喃鉢囉二合薩怛拏迦唎吽覩嚧雍二合十阿室怛二合喃摩訶吃囉二合訶喃毘耽薩拏伽唎吽覩嚧雍二合十囉叉囉叉𤙖願擁護我願擁護我婆伽婆帝佛頂大白傘蓋金剛頂髻般囉二合當雞囉母千手千臂有百千俱胝那眼不二熾𭵵之相金剛廣大母於三界內得大自在願擁護我願擁護我唵國王怖賊寇怖火怖水怖毒藥怖兵器怖他兵來侵怖饑饉怖冤害怖疾疫怖霹靂怖非時橫死怖地震動怖星射怖獄怖天怖龍怖電怖飛空怖惡獸怖復有天魅龍魅非天魅風神魅飛空魅尋香魅人非人魅大腹行魅施礙魅羅叉魅餓鬼魅空行母魅食肉魅部多魅甕腹魅臭鬼魅奇臭鬼魅塞建陀魅昏忘魅顛魅魔魅伏魅唎鉢帝魅於諸鬼魅願安隱我又復食神者食精氣者食胎者食血者食膏者食肉者食脂者食髓者食產者奪命者食吐者食不淨者食小便者食漏水者食殘食者食吐者食涎者食涕者食膿者食施食者食鬘者食香者食香氣者奪意者食華者食果者食五穀者食燒施者於是等中願安隱我如是等眾及諸鬼魅所造明呪悉皆斷除釘金剛鐝遍行所造明呪悉皆斷除釘金剛鐝空行空行母所造明呪悉皆斷除釘金剛鐝大鉢修鉢帝所造明呪悉皆斷除釘金剛鐝無愛子所造明呪悉皆斷除釘金剛鐝飛空正眾所造明呪悉皆斷除釘金剛鐝摩訶迦辣諸母鬼眾所造明呪悉皆斷除釘金剛鐝持髑髏者所造明呪悉皆斷除釘金剛鐝能勝作蜜辦諸事業所造明呪悉皆斷除釘金剛鐝四姊妹眾所造明呪悉皆斷除釘金剛鐝毘訖利帝慾樂自在集主等眾所造明呪悉皆斷除釘金剛鐝無衣勸善所造明呪悉皆斷除釘金剛鐝阿羅漢所造明呪悉皆斷除釘金剛鐝離慾所造明呪悉皆斷除釘金剛鐝密迹金剛手所造明呪悉皆斷除釘金剛鐝南謨婆伽婆帝佛頂大白傘蓋母願擁護我願擁護我唵阿悉怛阿拏辣囉迦二合鉢囉二合波悉普二合吒毘迦悉怛引怛鉢帝唎二合一拶辣拶辣二迦怛迦怛陀囉陀囉三毘陀囉毘陀囉四親陀親陀五頻陀頻陀六吽吽七發吒發吒莎嚩訶八醯醯發吒九呼呼發吒十阿牟羯耶發吒十阿鉢囉二合帝訶怛引耶發吒十二鉢囉鉢囉二合怛耶發吒十三阿素囉鼻怛囉二合婆拏迦囉耶發吒十四薩唎嚩二合提鞞毘藥二合發吒十六薩唎嚩二合拏伽毘藥二合發吒十七薩唎嚩二合阿素唎毘藥二合發吒十八薩唎嚩二合麻引嚕帝耶毘藥二合發吒十九薩唎嚩二合伽盧帝毘藥二合發吒二十薩唎嚩二合建闥唎二合鼻毘藥二合發吒二十一薩唎嚩二合緊那囉毘藥二合發吒二十二薩唎嚩二合麻呼囉訖毘藥二合發吒二十三薩唎嚩二合夜叉毘藥二合發吒二十四薩唎嚩二合囉叉娑毘藥二合發吒二十五薩唎嚩二合毘唎二合帝毘藥二合發吒二十六薩唎嚩二合鞞闍質毘藥二合發吒二十七薩唎嚩二合部帝毘藥二合發吒二十八薩唎嚩二合俱嚧二合斑帝毘藥二合發吒二十九薩唎嚩二合補怛尼毘藥二合發吒三十薩唎嚩二合迦吒補丹尼毘藥二合發吒三十一薩唎嚩二合悉乾帝毘藥二合發吒三十二薩唎嚩二合悟麻帝毘藥二合發吒三十三薩唎嚩二合闍夷毘藥二合發吒三十四薩唎嚩二合阿鉢悉麻二合唎毘藥二合發吒三十五薩唎嚩二合烏悉怛二合囉訖帝毘藥二合發吒三十六薩利嚩二合都嚧二合藍訖唎二合帝毘藥二合發吒三十七薩唎嚩二合突瑟毘唎二合契帝毘藥二合發吒三十八薩唎嚩二合拶唎毘藥二合發吒三十九薩唎嚩二合訖唎二合怛耶二合迦囉二合麻尼迦窟嚧二合帝毘藥二合發吒四十訖囉拏鞞怛怛囉二合毘藥二合發吒四十一質闍鉢囉二合沙迦薩唎嚩二合突闍唎二合地帝毘藥二合發吒四十二突嚧二合補帝毘藥二合發吒四十三薩唎嚩二合底唎二合提訖毘藥二合發吒四十四薩唎嚩二合沙囉二合麻尼毘藥二合發吒四十五薩唎嚩二合毘姪耶二合怛唎毘藥二合發吒四十六拶耶羯囉麻度羯囉耶毘藥二合發吒四十七薩唎嚩二合阿唎達二合薩怛訖毘藥二合發吒四十八毘姪耶二合拶唎毘藥二合發吒四十九拶部嚧二合必藥二合婆訖尼夷毘藥二合發吒五十薩唎嚩二合戈麻唎夷毘藥二合發吒五十一鞞姪耶二合囉遮夷毘藥二合發吒五十二摩訶鉢囉二合當鷄囉毘藥二合發吒五十三嚩日囉二合商迦辣鉢囉二合當雞囉囉拶耶發吒五十四麻訶迦辣耶麻帝唎二合伽拏那麻悉訖唎二合怛夷發吒五十五皆瑟拏二合鞞夷發吒五十六勃囉二合訶牟二合尼夷發吒五十七阿祁尼夷發吒五十八麻訶羯唎夷發吒五十九羯辣檀遲夷發吒六十因帝唎二合夷發吒六十一嚧帝唎二合夷發吒六十二戈麻唎夷發吒六十三婆囉醯夷發吒六十四拶門帝夷發吒六十五嚧底喇二合夷發吒六十六羯辣囉底唎二合夷發吒六十七耶麻丹帝夷發吒六十八羯鉢栗夷發吒六十九阿地穆帝尸摩舍拏婆悉尼夷發吒七十若有眾生於我起毒害心者起暴惡心者食神者食精氣者食胎者食血者食膏者食肉者食脂者食髓者食產者奪命者食吐者食不淨者食小便者食漏水者食殘食者食唾者食涎者食涕者食膿者食施食者食鬘者食香者食香氣者奪意者食花者食果者食五穀者食燒施者復有起嗔恨心者起毒害心者起暴惡心者天魅眾龍魅眾非天魅眾風神魅眾飛空魅眾尋香魅眾人非人魅眾大腹行魅眾藥剎魅眾囉剎魅眾餓鬼魅眾空行母魅眾食肉魅眾部多魅眾甕腹魅眾臭鬼魅眾奇臭鬼魅眾塞建陀魅眾昏忌魅眾顛魅眾魘魅眾伏魅眾利鉢帝魅眾焰魔魅眾禽魅眾母鬼喜魅眾遍羅魅眾除棘魅眾或有疫熱病一日二日三日四日病或常熱病極煩熱病時發病部多鬼病風黃痰病眾和合病所有熱病頭痛半頭痛願皆消除復有硬噎病眼病鼻病口病項病心病喉痛耳痛齒痛心痛腦痛脅痛背痛腹痛腰痛隱密處痛髀痛腨痛手痛足痛肢節等痛願令消除願擁護我大白傘蓋金剛頂髻般囉二合當鷄囉母十二由旬結金剛界所有部多起屍空行母等及鬼熱病瘡疥癬癩漏癎癰疽痒疔枯澁風驚寶毒蟲毒禱水火怨恨冤家惱害非時橫死復有底麻補伽蜂底辣怚蚖蛇蝮蝎鼠毒龍虎獅子熊羆犲狼如諸毒蜂奪害命者如是悉以明呪槃縛威神繫縛諸明呪繫縛所有鬼魅亦皆繫縛哆姪耶二合他唵阿拏隷阿拏隷二毖瑟帝毖瑟帝三鼻引囉鼻引囉四嚩日囉二合陀引唎五斑陀斑陀六嚩日囉二合跋尼發吒七吽吽發吒發吒八吽覩嚧雍二合斑陀發吒莎嚩訶九若人齎此佛頂大白傘蓋般囉二合當鷄囉母陀羅尼經或以樺皮貝葉素㲲書寫是已或帶身上或繫於項當知是人盡其生年毒不能害并諸器械水火寶毒蠱毒呪詛皆不能害亦無夭橫所有鬼魅等眾見者無有不生歡喜有八萬四千金剛部眾生大歡喜常加守護於八萬四千大劫之中得宿命智生生世世不生藥叉羅剎富單那迦吒富單那畢部多鬼等諸惡趣中亦不受生於貧窮下賤獲得無量無邊恒河沙數諸佛福德之聚若人持此佛頂大白傘蓋般囉二合當雞囉母陀羅尼經者不梵行者亦成梵行不持戒者亦成持戒不清淨者亦成清淨不布薩者亦成布薩不清齋者亦成清齋若有五無間罪及無始來所有宿殃舊業陳罪盡滅無餘若有女人設欲求男能受持斯佛頂大白傘蓋般囉二合當雞囉母陀羅尼經者便生智慧之男福德壽命色力圓滿命終之後隨得往生極樂國土若遭人病孳畜病疫癘惱害鬪諍逼迫他兵侵擾一切厄難賚此佛頂大白傘蓋無有能敵般囉二合當雞囉母陀羅尼繫幢頂上廣伸供養作大佛事奉迎斯呪安城四門或諸聚落都邑村野禮拜恭敬一心供養所有兵陣隨即消滅疫癘諸病惱害鬪諍他兵侵擾一切災厄悉皆消滅跢姪耶二合他一唵瑟覩嚧甕二合二斑陀斑陀三願擁護我願擁護我莎嚩訶四囉叉囉叉𤚥唵吽瑟覩嚧甕二合斑陀斑陀二嚩日囉二合願擁護我三囉叉囉叉𤚥四嚩日囉二合鉢尼夷吽發吒莎嚩訶五唵薩唎嚩二合多他伽跢一烏瑟尼沙阿嚩盧雞帝三牟唎二合陀帝佐囉引瑟四唵拶辣拶辣一伽陀伽陀二陀囉陀囉三毖陀囉毖陀囉四親陀親陀五頻陀頻陀六吽吽發吒發吒薩嚩訶七唵薩唎嚩二合多他伽跢烏瑟尼沙吽發吒發吒莎嚩訶跢姪耶二合他唵阿拏隷二阿拏隷三伽薩彌四伽薩彌五鼻引囉六鼻引囉七莎引彌八莎引彌九薩唎嚩二合佛陀十阿帝瑟他二合拏十一阿帝瑟提二合帝十二薩唎嚩二合多他伽跢十三烏瑟尼沙十四悉怛多鉢底唎二合十五吽發吒莎嚩訶十六吽麻麻吽尼十七莎嚩訶十八若能依佛修習所有一切諸天龍王隨順時序降霔甘雨爾時一切諸佛諸大菩薩天龍藥叉徤達縛阿素洛揭路荼緊捺洛莫呼洛伽人非人等一切大眾聞佛所說皆大歡喜信受奉行
